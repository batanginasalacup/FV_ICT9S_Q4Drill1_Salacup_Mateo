<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width", initial-scale=1.0>
    <title>Q4 Drill 1</title>
</head>
<body>
    <h1>JavaScript Conditional Statements</h1>
    <input type="text" id="Electricity" class="form-control" placeholder="type here...">
    <button class="btn btn-info" onclick="checkElectricity()">Check Electricity</button>




<script>
    // checkElectricity
    function checkElectricity(){
    
    var electricity = document.getElementById("Electricity").value;

    if(isNaN(electricity) || electricity < 0 ){
        alert("Please input a valid consumption");
    }

    if (electricity > 100){
        alert("Discounted electricity consumption");
    }

    else if  (electricity < 99){
        alert("Normal residential consumption.")
    }
    else if (electricity > 200){
        alert("Typical residential consumption.")
    }

    else if (electricity > 500){}
        alert("Higher residential consumption.");
    }

}
</script>

</body>
</html>
